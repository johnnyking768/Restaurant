<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dupz | Admin Login</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Kalam:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Admin.css">
</head>
<body>
  <main class="login-page">
    <div class="login-sky" aria-hidden="true">
      <div class="cloud cloud-one"></div>
      <div class="cloud cloud-two"></div>
      <div class="cloud cloud-three"></div>
      <div class="mountain mountain-back"></div>
      <div class="mountain mountain-mid"></div>
      <div class="mountain mountain-front"></div>
      <div class="tree tree-left"></div>
      <div class="tree tree-right"></div>
    </div>
    <form class="login-card" data-admin-login>
      <a class="login-brand" href="../Home/index.html">Dupz</a>
      <h1>LOGIN</h1>
      <label class="login-field">
        <span>Username</span>
        <input type="text" name="username" autocomplete="username" required>
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </span>
      </label>
      <label class="login-field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
        <span class="field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
            <path d="m4 4 16 16"></path>
          </svg>
        </span>
      </label>
      <div class="login-options">
        <label class="remember-option">
          <input type="checkbox" name="remember">
          <span>Remember Me</span>
        </label>
        <a href="../Home/index.html">Forgot Password?</a>
      </div>
      <button type="submit">Login</button>
      <p class="register-line">Don't have an Account? <a href="../Home/index.html">Register</a></p>
      <p class="login-error" data-login-error hidden>Invalid admin credentials.</p>
    </form>
  </main>

  <script src="../api-config.js"></script>
  <script src="Login.js"></script>
</body>
</html>
